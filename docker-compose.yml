name: isbe

services:
  postgres:
    image: postgres:16-alpine
    container_name: isbe-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-isbe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-isbe}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isbe}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: isbe-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: isbe-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-isbe}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    container_name: isbe-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfusedata:/var/lib/postgresql/data
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: isbe-langfuse
    depends_on:
      - langfuse-db
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-32chars-changeme-32chars}
      SALT: ${LANGFUSE_SALT:-changeme-salt-changeme-salt}
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"
    restart: unless-stopped

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: isbe-prefect-server
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-isbe}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/prefect
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4200:4200"
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: isbe-uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptimekumadata:/app/data
    restart: unless-stopped

  # radar-worker: long-lived Prefect worker that fires the cron-scheduled flows.
  #
  # PREREQUISITE on Docker Desktop Windows:
  #   - Enable F: drive (or whichever drive holds this repo) under
  #     Settings → Resources → File sharing. Otherwise bind mounts silently
  #     create empty directories and the container fails with "ModuleNotFoundError: isbe".
  #
  # Alternative (no docker): run `uv run radar scheduler serve` on host.
  # That's the same outcome — Prefect deployments register identically.
  radar-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: isbe/radar:latest
    container_name: isbe-radar-worker
    profiles: ["worker"]  # opt-in: `docker compose --profile worker up -d`
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      # Override host defaults to use compose service names
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-isbe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-isbe}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-isbe}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
      PREFECT_API_URL: http://prefect-server:4200/api
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      ISBE_LLM_PROVIDER: ${ISBE_LLM_PROVIDER:-deepseek}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ISBE_UID: ${ISBE_UID:-me}
    volumes:
      # Bind mount user-visible state — host paths == container /app paths
      - ./memory:/app/memory
      - ./papers:/app/papers
      - ./artifacts:/app/artifacts
      # Bind mount source for live edits (remove for prod-frozen build)
      # alembic.ini stays as image-baked (single-file mounts are flaky on Docker Desktop Windows)
      - ./src:/app/src
      - ./alembic:/app/alembic
    command: ["scheduler", "serve"]
    restart: unless-stopped

volumes:
  pgdata:
  qdrantdata:
  miniodata:
  langfusedata:
  uptimekumadata:
