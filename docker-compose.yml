name: isbe

# Server / prod-like layout: only Prefect :4200 is published to the host.
# All other services talk over the internal `isbe-net` bridge network.
#
# For local dev on Windows that needs MinIO/Langfuse/Qdrant/Uptime-Kuma UIs,
# `docker-compose.override.yml` re-publishes those ports automatically.
# Disable the override on the server with:
#   docker compose -f docker-compose.yml up -d
# (omitting -f makes Compose auto-merge the override).

networks:
  isbe-net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: isbe-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-isbe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-isbe}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isbe}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [isbe-net]

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: isbe-qdrant
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped
    networks: [isbe-net]

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: isbe-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-isbe}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [isbe-net]

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: isbe-phoenix
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - phoenixdata:/mnt/data
    restart: unless-stopped
    networks: [isbe-net]

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: isbe-prefect-server
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-isbe}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/prefect
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4200:4200"   # only port published to the host
    restart: unless-stopped
    networks: [isbe-net]

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: isbe-uptime-kuma
    volumes:
      - uptimekumadata:/app/data
    restart: unless-stopped
    networks: [isbe-net]

  # radar-worker: long-lived Prefect worker that fires the cron-scheduled flows.
  # Opt-in: `docker compose --profile worker up -d`
  #
  # On Linux server: the bind mounts below resolve to ./memory etc relative to
  # the directory you run `docker compose` from. Make sure that directory holds
  # the repo (or at least the memory/ papers/ artifacts/ subdirs).
  #
  # On Docker Desktop Windows: enable F: drive (or whichever drive holds this
  # repo) under Settings -> Resources -> File sharing.
  radar-worker:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: isbe/radar:latest
    container_name: isbe-radar-worker
    profiles: ["worker"]
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-isbe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-isbe}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-isbe}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
      PREFECT_API_URL: http://prefect-server:4200/api
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:6006/v1/traces}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-isbe}
      ISBE_LLM_PROVIDER: ${ISBE_LLM_PROVIDER:-deepseek}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ISBE_UID: ${ISBE_UID:-me}
    volumes:
      - ./memory:/app/memory
      - ./papers:/app/papers
      - ./artifacts:/app/artifacts
      - ./src:/app/src
      - ./alembic:/app/alembic
    command: ["scheduler", "serve"]
    restart: unless-stopped
    networks: [isbe-net]

volumes:
  pgdata:
  qdrantdata:
  miniodata:
  phoenixdata:
  uptimekumadata:
